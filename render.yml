services:
  - type: web
    name: crm-backend
    env: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile.production
    healthCheckPath: /api/users
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: crm-mysql
          property: host
      - key: DB_PORT
        fromDatabase:
          name: crm-mysql
          property: port
      - key: DB_NAME
        fromDatabase:
          name: crm-mysql
          property: database
      - key: DB_USER
        fromDatabase:
          name: crm-mysql
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: crm-mysql
          property: password
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: 86400
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-frontend.onrender.com

  - type: web
    name: crm-frontend
    env: docker
    plan: free
    dockerfilePath: ./frontend/dockerfile
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production

databases:
  - name: crm-mysql
    plan: free
    databaseName: crm_db
    user: crm_user