services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3009:3001"  # Changed to map host port 3009 to container port 3001
    environment:
      - NODE_ENV=production
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:80"  # PHP сервер на 8080 порту
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=crm_db
      - DB_USER=crm_user
      - DB_PASSWORD=crm_password
      - JWT_SECRET=your-super-secret-jwt-key-change-this
      - JWT_EXPIRATION=86400
      - CORS_ALLOWED_ORIGINS=http://localhost:3009
    depends_on:
      - mysql
    volumes:
      - ./api.php:/var/www/html/public/api.php

  mysql:
    image: mysql:8.0
    platform: linux/arm64
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: crm_db
      MYSQL_USER: crm_user
      MYSQL_PASSWORD: crm_password
    ports:
      - "3309:3306"  # Changed to 3309 to avoid conflicts
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    platform: linux/amd64
    restart: always
    ports:
      - "8083:80"  # Changed to 8083 to avoid conflicts
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    depends_on:
      - mysql

volumes:
  db_data:  # Явное именование тома для базы данных