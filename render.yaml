services:
  - type: web
    name: crm-frontend
    runtime: docker
    plan: free
    dockerfilePath: frontend/Dockerfile.prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://crm-backend.onrender.com

  - type: web
    name: crm-backend
    runtime: docker
    plan: free
    dockerfilePath: backend/Dockerfile.production
    envVars:
      - key: DB_HOST
        value: mysql
      - key: DB_PORT
        value: 3306
      - key: DB_NAME
        value: crm_db
      - key: DB_USER
        value: crm_user
      - key: DB_PASSWORD
        value: crm_password
      - key: JWT_SECRET
        value: your-super-secret-jwt-key-change-this
      - key: JWT_EXPIRATION
        value: 86400
      - key: CORS_ALLOWED_ORIGINS
        value: https://crm-frontend.onrender.com

  - type: mysql
    name: mysql
    databaseName: crm_db
    username: crm_user
    plan: free